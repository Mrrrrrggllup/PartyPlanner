services:
  db:
    image: postgres:16
    container_name: partyplanner-db
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: partyplanner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d partyplanner"]
      interval: 5s
      timeout: 5s
      retries: 5
  adminer:
    image: adminer
    ports:
      - "8090:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: